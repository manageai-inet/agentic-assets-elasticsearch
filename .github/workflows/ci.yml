name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (v8)
    runs-on: ubuntu-latest

    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "true"
          ELASTIC_PASSWORD: Admin123!
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -s -u elastic:Admin123! http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: v8/go.mod
          cache-dependency-path: v8/go.sum

      - name: Download modules
        working-directory: v8
        run: go mod download

      - name: Vet
        working-directory: v8
        run: go vet ./...

      - name: Build
        working-directory: v8
        run: go build ./...

      - name: Wait for Elasticsearch
        run: |
          for i in {1..30}; do
            if curl -s -u elastic:Admin123! http://localhost:9200/_cluster/health | grep -E '"status":"(green|yellow)"'; then
              echo "Elasticsearch is ready"
              exit 0
            fi
            echo "Waiting for Elasticsearch... ($i)"
            sleep 5
          done
          echo "Elasticsearch did not become ready in time"
          exit 1

      - name: Test
        working-directory: v8
        run: go test -v -race -count=1 ./...
